version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci
  build:
    commands:
      - echo "Running the build..."
      - npm run build
artifacts:
  files:
    # Include all files from the build directory
    - '**/*'
  base-directory: 'build'
